---

name: Pre-Merge CI Pipeline

on:
  pull_request:
    branches:
      - main
      - release-*
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        persist-credentials: false

    - name: "Setup"
      uses: open-edge-platform/orch-ci/.github/actions/bootstrap@aff1e9efbc37ed254c0eea575f51d379f47dc9a0  # 2026.1.1
      with:
        gh_token: ${{ secrets.SYS_EMF_GH_TOKEN }}
        bootstrap_tools: "go,gotools,nodejs"

    - name: Lint code
      run: make lint

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        persist-credentials: false

    - name: "Setup"
      uses: open-edge-platform/orch-ci/.github/actions/bootstrap@aff1e9efbc37ed254c0eea575f51d379f47dc9a0  # 2026.1.1
      with:
        gh_token: ${{ secrets.SYS_EMF_GH_TOKEN }}
        bootstrap_tools: "go,gotools"

    - name: Build code
      run: make build

  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ github.head_ref }}
        persist-credentials: false

    - name: "Setup"
      uses: open-edge-platform/orch-ci/.github/actions/bootstrap@aff1e9efbc37ed254c0eea575f51d379f47dc9a0  # 2026.1.1
      with:
        gh_token: ${{ secrets.SYS_EMF_GH_TOKEN }}
        bootstrap_tools: "go,gotools" 

    - name: Test code
      run: make test
  
  pre-merge:
    permissions:
      contents: read
    needs: [lint, build, test]
    uses: open-edge-platform/orch-ci/.github/workflows/pre-merge.yml@a54943a045a0f86e4e3f6807d2579fca50baf4fb  # 2026.1.1
    with:
      bootstrap_tools: "base,go"
      cache_go: true
      remove_cache_go: true
      run_security_scans: true
      run_version_check: true
      run_dep_version_check: true
      run_build: false
      run_lint: false
      run_test: false
      run_validate_clean_folder: false
      run_docker_build: true
      run_docker_push: false
      run_helm_build: true
      run_helm_push: false
      run_artifact: false
      version_suffix: "-pr-${{ github.event.number }}"
    secrets: inherit  # zizmor: ignore[secrets-inherit]
